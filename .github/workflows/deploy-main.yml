name: deploy-main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat > ~/.ssh/config <<EOF
          Host playground-umc-7th
            HostName $EC2_HOST
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Wait for SSH to be available
        run: |
          for i in {1..5}; do
            nc -zv ${{ secrets.EC2_HOST }} 22 && break
            echo "Waiting for SSH to become available..."
            sleep 5
          done

      - name: Copy Workspace (with retry)
        run: |
          for i in {1..5}; do
            scp -r ./[!.]* playground-umc-7th:/opt/app && break
            echo "Retrying in 5 seconds..."
            sleep 5
          done

      - name: Install dependencies
        run: |
          ssh playground-umc-7th 'npm install --prefix /opt/app/travel_box_backend'

      - name: Copy systemd service file
        run: |
          ssh playground-umc-7th '
            echo "[Unit]
            Description=UMC 7th Project
            After=network.target

            [Service]
            User=ubuntu
            ExecStart=/usr/bin/npm run dev --prefix /opt/app/travel_box_backend
            Restart=always

            [Install]
            WantedBy=multi-user.target" | sudo tee /etc/systemd/system/app.service
          '

      - name: Enable systemd service
        run: |
          ssh playground-umc-7th 'sudo systemctl daemon-reload'
          ssh playground-umc-7th 'sudo systemctl enable app'

      - name: Restart systemd service
        run: |
          ssh playground-umc-7th 'sudo systemctl restart app'
