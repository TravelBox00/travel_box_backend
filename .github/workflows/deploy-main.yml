name: deploy-main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat >>~/.ssh/config <<END
          Host playground-umc-7th
            HostName $EC2_HOST
            User $EC2_USER
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 60
          END
        env:
          EC2_USER: ubuntu
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Wait for SSH connection
        run: |
          for i in {1..5}; do
            if ssh playground-umc-7th 'exit'; then
              break
            fi
            echo "Retrying SSH connection... ($i/5)"
            sleep 10
          done

      - name: Debug directory
        run: |
          pwd
          ls -la

      - name: Copy Workspace
        run: |
          ssh playground-umc-7th 'sudo rm -rf /opt/app'
          ssh playground-umc-7th 'sudo mkdir -p /opt/app'
          ssh playground-umc-7th 'sudo chown ubuntu:ubuntu /opt/app'
          scp -r ./* playground-umc-7th:/opt/app/

      - name: Install dependencies
        run: |
          ssh playground-umc-7th 'cd /opt/app && npm install'

      - name: Copy systemd service file
        run: |
          ssh playground-umc-7th '
            echo "[Unit]
            Description=UMC 7th Project
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/opt/app
            ExecStart=/usr/bin/npm run dev
            Restart=always
            Environment=NODE_ENV=production
            StandardOutput=append:/var/log/app.log
            StandardError=append:/var/log/app.error.log

            [Install]
            WantedBy=multi-user.target" | sudo tee /etc/systemd/system/app.service
          '

      - name: Enable and restart service
        run: |
          ssh playground-umc-7th 'sudo systemctl daemon-reload'
          ssh playground-umc-7th 'sudo systemctl enable app'
          ssh playground-umc-7th 'sudo systemctl restart app'
