name: deploy-main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat >>~/.ssh/config <<END
          Host playground-umc-7th
            HostName $EC2_HOST
            User $EC2_USER
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 60
          END
        env:
          EC2_USER: ubuntu
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Wait for SSH connection
        run: |
          for i in {1..5}; do
            if ssh playground-umc-7th 'exit'; then
              break
            fi
            echo "Retrying SSH connection... ($i/5)"
            sleep 10
          done

      - name: Copy Workspace
        run: |
          ssh playground-umc-7th 'sudo rm -rf /opt/app'
          ssh playground-umc-7th 'sudo mkdir -p /opt/app'
          ssh playground-umc-7th 'sudo chown ubuntu:ubuntu /opt/app'
          scp -r ./* playground-umc-7th:/opt/app/

      - name: Setup Node environment
        run: |
          ssh playground-umc-7th '
            cd /opt/app
            
            # Node.js 버전 확인 및 업데이트
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
            
            # npm 캐시 클리어 및 전역 패키지 설치
            sudo npm cache clean -f
            sudo npm install -g npm@latest
            sudo npm install -g typescript ts-node nodemon
            
            # 프로젝트 의존성 설치
            npm install
            
            # TypeScript 설정 확인
            npx tsc --version
          '

      - name: Create env file
        run: |
          ssh playground-umc-7th 'cat > /opt/app/.env << EOL
          PORT=3000
          HOST=0.0.0.0
          NODE_ENV=production
          EOL'

      - name: Copy systemd service file
        run: |
          ssh playground-umc-7th '
            echo "[Unit]
            Description=UMC 7th Project
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/opt/app
            Environment=NODE_ENV=production
            Environment=PORT=3000
            Environment=HOST=0.0.0.0
            Environment=PATH=/usr/bin:/usr/local/bin
            ExecStart=/usr/bin/npm run dev
            Restart=always
            StandardOutput=append:/var/log/app.log
            StandardError=append:/var/log/app.error.log

            [Install]
            WantedBy=multi-user.target" | sudo tee /etc/systemd/system/app.service
          '

      - name: Enable and restart service
        run: |
          ssh playground-umc-7th '
            sudo systemctl daemon-reload
            sudo systemctl enable app
            sudo systemctl restart app
            sleep 5
          '

      - name: Check service status and logs
        run: |
          ssh playground-umc-7th '
            sudo systemctl status app
            echo "=== Application Logs ==="
            sudo tail -n 50 /var/log/app.log
            echo "=== Error Logs ==="
            sudo tail -n 50 /var/log/app.error.log
          '
