name: deploy-main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # LTS 버전 사용

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host playground-umc-7th
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF

      - name: Test SSH Connection
        run: |
          ssh -vvv playground-umc-7th "echo '✅ SSH Connection Successful'"

      - name: Ensure EBS is Mounted and Fix Permissions
        run: |
          ssh playground-umc-7th '
            if ! mountpoint -q /mnt/ebs; then
              echo "❌ EBS is not mounted!"
              exit 1
            fi
            sudo chown -R ubuntu:ubuntu /mnt/ebs
            sudo chmod -R 775 /mnt/ebs
          '

      - name: Prepare Workspace on EBS
        run: |
          ssh playground-umc-7th '
            mkdir -p /mnt/ebs/travel_box_backend
            cd /mnt/ebs/travel_box_backend
            rsync -avz --exclude={'.git','dist','.env','node_modules','*.log'} ./ playground-umc-7th:/mnt/ebs/travel_box_backend/
          '

      - name: Install Dependencies
        run: |
          ssh playground-umc-7th '
            cd /mnt/ebs/travel_box_backend
            npm install
          '

      - name: Create .env file
        run: |
          ssh playground-umc-7th 'cat > /mnt/ebs/travel_box_backend/.env << EOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=${{ secrets.DB_PORT }}
          PORT=${{ secrets.PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          AWS_BUCKET=${{ secrets.AWS_BUCKET }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          ELASTIC_SEARCH=${{ secrets.ELASTIC_SEARCH }}
          ELASTIC_SEARCH_API=${{ secrets.ELASTIC_SEARCH_API }}
          EOF'

      - name: Kill Existing Node Processes
        run: |
          ssh playground-umc-7th 'pkill node || true'

      - name: Start Application in Background
        run: |
          ssh playground-umc-7th '
            cd /mnt/ebs/travel_box_backend
            nohup npm run dev > app.log 2> app.error.log &
          '

      - name: Check if Application is Running
        run: |
          ssh playground-umc-7th '
            sleep 10  # Give some time for the application to start
            if pgrep -x "node" > /dev/null
            then
              echo "Application is running."
            else
              echo "Application failed to start."
              exit 1
            fi
          '
