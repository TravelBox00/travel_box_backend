name: deploy-main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository # 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Setup Node.js # Node.js 설치
        uses: actions/setup-node@v3
        with:
          node-version: '18' # LTS 버전 사용

      - name: Configure SSH # SSH 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << EOF
          Host playground-umc-7th
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF

      - name: Test SSH Connection # SSH 연결 테스트
        run: |
          ssh -vvv playground-umc-7th "echo '✅ SSH Connection Successful'"

      - name: Ensure EBS is Mounted and Fix Permissions # EBS 마운트 확인 및 권한 설정
        run: |
          ssh playground-umc-7th '
            if ! mountpoint -q /mnt/ebs; then
              echo "❌ EBS is not mounted!"
              exit 1
            fi
            sudo chown -R ubuntu:ubuntu /mnt/ebs
            sudo chmod -R 775 /mnt/ebs
          '

      - name: Stop Previous Process (Important!) # 기존 프로세스 종료 (핵심)
        run: |
          ssh playground-umc-7th '
            set -x # 명령어 실행 전 출력 (디버깅용)
            cd /mnt/ebs/travel_box_backend
            # ***CRITICAL CHANGE: Make pgrep SPECIFIC***
            for PID in $(pgrep -f "npm run dev"); do  # 또는 "node your_app.js", 또는 "your_pm2_app_name"
              if [[ -n "$PID" ]]; then
                echo "Stopping process with PID: $PID"
                sudo kill $PID # 필요시 sudo 사용 (권한 문제)
                sleep 1
                if [[ $(pgrep -f "npm run dev" | grep $PID) ]]; then # Check for *this* PID
                  echo "Process $PID did not terminate after kill. Force killing."
                  kill -9 $PID
                fi
              fi
            done
            exit $? # 종료 코드 반환 (디버깅용)
          '

      - name: Copy Workspace to EBS # EBS에 파일 복사 (node_modules 제외)
        run: |
          rsync -avz --exclude={'.git','dist','node_modules'} ./ playground-umc-7th:/mnt/ebs/travel_box_backend/

      - name: Install Dependencies # 의존성 설치
        run: |
          ssh playground-umc-7th '
            cd /mnt/ebs/travel_box_backend
            npm install
          '

      - name: Create .env file # .env 파일 생성
        run: |
          ssh playground-umc-7th 'cat > /mnt/ebs/travel_box_backend/.env << EOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=${{ secrets.DB_PORT }}
          PORT=${{ secrets.PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          AWS_BUCKET=${{ secrets.AWS_BUCKET }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          ELASTIC_SEARCH=${{ secrets.ELASTIC_SEARCH }}
          ELASTIC_SEARCH_API=${{ secrets.ELASTIC_SEARCH_API }}
          EOF'

      - name: Start Application # 애플리케이션 실행
        run: |
          ssh playground-umc-7th '
            cd /mnt/ebs/travel_box_backend
            nohup npm run dev # 또는 pm2 start ...
          '

      - name: Check Service Status # 서비스 상태 확인
        if: always()
        run: |
          ssh playground-umc-7th '
            echo "=== Application Logs ==="
            tail -n 20 /mnt/ebs/travel_box_backend/app.log # 정확한 로그 파일 경로로 수정
            echo "=== Error Logs ==="
            tail -n 20 /mnt/ebs/travel_box_backend/app.error.log # 정확한 로그 파일 경로로 수정
          '
