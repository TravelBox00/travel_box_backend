name: deploy-main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          cat > ~/.ssh/config << EOF
          Host playground-umc-7th
            HostName ${{ secrets.EC2_HOST }}
            User ubuntu
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF

      - name: Copy Workspace
        run: |
          # 제외할 파일/디렉토리 목록 생성
          echo "node_modules/" > .gitignore
          echo "dist/" >> .gitignore
          echo ".git/" >> .gitignore
          echo "*.log" >> .gitignore
          
          # 기존 디렉토리 제거 및 새 디렉토리 생성
          ssh playground-umc-7th 'rm -rf ~/travel_box_backend && mkdir -p ~/travel_box_backend'
          
          # rsync를 사용하여 파일 전송 (제외 목록 적용)
          rsync -avz --exclude-from=.gitignore --delete ./ playground-umc-7th:~/travel_box_backend/

      - name: Install Dependencies
        run: |
          ssh playground-umc-7th '
            cd ~/travel_box_backend
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
            npm install --no-audit --no-fund --legacy-peer-deps
            npm install -g typescript ts-node nodemon --no-audit --no-fund
          '

      - name: Create env file
        run: |
          ssh playground-umc-7th 'cat > ~/travel_box_backend/.env << EOF
          PORT=3000
          HOST=0.0.0.0
          NODE_ENV=production
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF'

      - name: Setup and Start Service
        run: |
          ssh playground-umc-7th '
            sudo systemctl stop app || true
            sudo tee /etc/systemd/system/app.service << EOF
            [Unit]
            Description=UMC 7th Project
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/home/ubuntu/travel_box_backend
            Environment=NODE_ENV=production
            Environment=PORT=3000
            Environment=HOST=0.0.0.0
            ExecStart=$(which npm) run dev
            Restart=always
            RestartSec=10
            StandardOutput=append:/var/log/app.log
            StandardError=append:/var/log/app.error.log

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable app
            sudo systemctl start app
            sleep 5
          '

      - name: Check Service Status
        if: always()
        run: |
          ssh playground-umc-7th '
            sudo systemctl status app --no-pager || true
            echo "=== Application Logs ==="
            sudo tail -n 20 /var/log/app.log || true
            echo "=== Error Logs ==="
            sudo tail -n 20 /var/log/app.error.log || true
          '
