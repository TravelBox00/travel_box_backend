name: deploy-main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # known_hosts 파일 생성 및 호스트 키 추가
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          
          cat >>~/.ssh/config <<END
          Host playground-umc-7th
            HostName $EC2_HOST
            User $EC2_USER
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking accept-new
            ConnectTimeout 30
            ServerAliveInterval 60
          END
        env:
          EC2_USER: ubuntu
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy Workspace
        run: |
          ssh playground-umc-7th 'sudo rm -rf ~/travel_box_backend'
          ssh playground-umc-7th 'mkdir -p ~/travel_box_backend'
          scp -r ./* playground-umc-7th:~/travel_box_backend/

      - name: Install Dependencies
        run: |
          ssh playground-umc-7th '
            cd ~/travel_box_backend
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            npm install --no-audit --no-fund --legacy-peer-deps
            npm install -g typescript ts-node nodemon --no-audit --no-fund
          '

      - name: Create env file
        run: |
          ssh playground-umc-7th 'cat > ~/travel_box_backend/.env << EOL
          PORT=3000
          HOST=0.0.0.0
          NODE_ENV=production
          EOL'

      - name: Setup and Start Service
        run: |
          ssh playground-umc-7th '
            sudo systemctl stop app || true
            sudo tee /etc/systemd/system/app.service << EOL
            [Unit]
            Description=UMC 7th Project
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/home/ubuntu/travel_box_backend
            Environment=NODE_ENV=production
            Environment=PORT=3000
            Environment=HOST=0.0.0.0
            ExecStart=/usr/bin/npm run dev
            Restart=on-failure
            RestartSec=10
            StandardOutput=append:/var/log/app.log
            StandardError=append:/var/log/app.error.log

            [Install]
            WantedBy=multi-user.target
            EOL

            sudo systemctl daemon-reload
            sudo systemctl enable app
            sudo systemctl start app
            sleep 10
          '

      - name: Check Service Status
        run: |
          ssh playground-umc-7th '
            sudo systemctl status app --no-pager
            echo "=== Application Logs ==="
            sudo tail -n 20 /var/log/app.log
            echo "=== Error Logs ==="
            sudo tail -n 20 /var/log/app.error.log
          '
